name: Terraform MongoDB Deploy

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # Install kubectl
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3

    # 🔥 Create Kubernetes cluster (FAST + RELIABLE)
    - name: Create Kind Cluster
      uses: helm/kind-action@v1

    # Setup Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    # Terraform Init
    - name: Terraform Init
      run: terraform init
      working-directory: ./k8s-terraform

    # Terraform Plan
    - name: Terraform Plan
      run: terraform plan
      working-directory: ./k8s-terraform

    # Terraform Apply
    - name: Terraform Apply
      run: terraform apply -auto-approve
      working-directory: ./k8s-terraform

    # 🔥 Verify Deployment
    - name: Check Pods
      run: kubectl get pods

    - name: Check Services
      run: kubectl get svc